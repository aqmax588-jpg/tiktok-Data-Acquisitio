<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台</title>
<style>
body { font-family: "Microsoft YaHei"; font-size:14px; margin:0; padding:20px; background:#f4f5f7; }
.login-box { width:350px; margin:80px auto; background:#fff; padding:30px; border-radius:8px; box-shadow:0 0 8px #ccc; }
.login-box h3 { text-align:center; margin-bottom:25px; }
.login-box input { width:100%; box-sizing:border-box; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:4px; }
.login-box button { width:100%; padding:10px; background:#007bff; color:#fff; border:none; border-radius:4px; cursor:pointer; }

.wrap { display:none; }
.top-tools { background:#fff; padding:15px; border-radius:6px; margin-bottom:15px; }
textarea { width:300px; height:100px; padding:8px; }
table { width:100%; background:#fff; border-collapse:collapse; }
th,td { border:1px solid #eee; padding:8px 10px; text-align:center; }
th { background:#f8f9fa; }
button { cursor:pointer; padding:4px 8px; border:none; border-radius:3px; }
.btn-blue { background:#007bff; color:#fff; }
.btn-red { background:#dc3545; color:#fff; }
.btn-green { background:#28a745; color:#fff; }
</style>
</head>
<body>

<!-- 登录页 原版没变 -->
<div class="login-box" id="loginDiv">
  <h3>管理员登录</h3>
  <input type="text" placeholder="管理员账号" id="adminUser">
  <input type="password" placeholder="管理员密码" id="adminPwd">
  <button onclick="adminLogin()">登录</button>
</div>

<!-- 原版管理首页 完全你以前的样子 没改任何布局 -->
<div class="wrap" id="mainDiv">
  <div class="top-tools">
    <span>批量添加账号：</span>
    <textarea id="batchContent" placeholder="一行一个 账号 密码"></textarea>
    &nbsp;&nbsp;
    <input type="number" id="setDays" placeholder="有效天数" value="30">
    <button class="btn-blue" onclick="batchAdd()">批量创建</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>账号</th>
        <th>密码</th>
        <th>激活状态</th>
        <th>到期时间</th>
        <th>设备指纹</th>
        <th>换绑次数</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
const API_HOST = "https://tiktok-data-acquisitio.onrender.com";

// 管理员登录
async function adminLogin(){
  let u = document.getElementById("adminUser").value.trim();
  let p = document.getElementById("adminPwd").value.trim();
  let res = await fetch(`${API_HOST}/api/admin/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:u,pwd:p})
  });
  let json = await res.json();
  if(json.ok){
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("mainDiv").style.display = "block";
    loadDataList();
  }else{
    alert("账号或密码错误");
  }
}

// 加载列表 核心：沿用你原来界面，只改取值为 displayExpire
async function loadDataList(){
  let res = await fetch(`${API_HOST}/api/admin/list`);
  let list = await res.json();
  let html = "";

  list.forEach(row=>{
    let activeText = row.activeTime ? "已激活" : "未激活";
    
    // 关键：优先取后端给好的展示字段，原版界面不动
    let expireText = row.displayExpire || "永久";

    let deviceText = row.deviceFp ? "已绑定" : "未绑定";
    let statusText = row.enabled ? "正常" : "禁用";

    html += `<tr>
      <td>${row.username}</td>
      <td>${row.password}</td>
      <td>${activeText}</td>
      <td>${expireText}</td>
      <td>${deviceText}</td>
      <td>${row.changeDeviceTimes}</td>
      <td>${statusText}</td>
      <td>
        <button class="btn-blue" onclick="resetDevice('${row.username}')">重置设备</button>
        <button class="btn-red" onclick="userLogout('${row.username}')">强制下线</button>
        <button class="btn-green" onclick="toggleEnable('${row.username}',${!row.enabled})">${row.enabled?'禁用':'启用'}</button>
        <button class="btn-red" onclick="delUser('${row.username}')">删除</button>
      </td>
    </tr>`;
  });

  document.getElementById("tableBody").innerHTML = html;
}

// 重置换绑次数
async function resetDevice(name){
  await fetch(`${API_HOST}/api/admin/reset-device-times`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:name})
  });
  loadDataList();
}

// 强制下线
async function userLogout(name){
  await fetch(`${API_HOST}/api/admin/force-logout`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:name})
  });
  loadDataList();
}

// 启用禁用
async function toggleEnable(name,flag){
  await fetch(`${API_HOST}/api/admin/toggle`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:name,enabled:flag})
  });
  loadDataList();
}

// 删除用户
async function delUser(name){
  if(!confirm("确定删除该账号？"))return;
  await fetch(`${API_HOST}/api/admin/delete`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:name})
  });
  loadDataList();
}

// 批量创建
async function batchAdd(){
  let content = document.getElementById("batchContent").value;
  let days = document.getElementById("setDays").value;
  let res = await fetch(`${API_HOST}/api/admin/batch`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({lines:content,days:Number(days)})
  });
  let json = await res.json();
  alert(`新增成功：${json.success} 个，已存在：${json.exist} 个`);
  loadDataList();
  document.getElementById("batchContent").value = "";
}
</script>

</body>
</html>
