<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif;}
body{background:#f5f6f8;padding:20px;}
.login-wrap{max-width:400px;margin:100px auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 0 10px #00000015;}
.login-wrap h3{text-align:center;margin-bottom:20px;font-size:20px;}
.input-item{margin-bottom:15px;}
.input-item input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;}
.login-btn{width:100%;padding:10px;background:#2d8cf0;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;}
.container{display:none;}
.top-bar{background:#fff;padding:15px;border-radius:8px;margin-bottom:15px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.btn{padding:6px 12px;background:#2d8cf0;color:#fff;border:none;border-radius:4px;cursor:pointer;}
.btn-danger{background:#f56c6c;}
.btn-success{background:#67c23a;}
.box{background:#fff;border-radius:8px;padding:15px;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{border:1px solid #eee;padding:10px;text-align:center;}
th{background:#fafafa;}
textarea{width:100px;height:120px;padding:8px;border:1px solid #ddd;border-radius:4px;}
.batch-box{margin:10px 0;}
</style>
</head>
<body>

<!-- 管理员登录 -->
<div class="login-wrap" id="loginBox">
  <h3>管理端登录</h3>
  <div class="input-item">
    <input type="text" id="adminUser" placeholder="管理员账号">
  </div>
  <div class="input-item">
    <input type="password" id="adminPwd" placeholder="管理员密码">
  </div>
  <button class="login-btn" onclick="adminLogin()">登录</button>
</div>

<!-- 管理主界面 -->
<div class="container" id="mainBox">
  <div class="top-bar">
    <div>批量创建：</div>
    <textarea id="batchText" placeholder="一行一个 账号 密码"></textarea>
    <div class="input-item">
      <input type="number" id="dayNum" placeholder="有效天数" value="30">
    </div>
    <button class="btn" onclick="batchAdd()">批量创建</button>
  </div>

  <div class="box">
    <table>
      <thead>
        <tr>
          <th>账号</th>
          <th>密码</th>
          <th>激活状态</th>
          <th>到期时间</th>
          <th>设备绑定</th>
          <th>换绑次数</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const backend = "https://tiktok-data-acquisitio.onrender.com";

// 管理员登录
async function adminLogin(){
  let user = document.getElementById("adminUser").value;
  let pwd = document.getElementById("adminPwd").value;
  let res = await fetch(`${backend}/api/admin/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user,pwd})
  });
  let data = await res.json();
  if(data.ok){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("mainBox").style.display="block";
    loadList();
  }else{
    alert("账号密码错误");
  }
}

// 加载列表
async function loadList(){
  let res = await fetch(`${backend}/api/admin/list`);
  let list = await res.json();
  let html = "";
  list.forEach(item=>{
    // 激活状态
    let activeText = item.activeTime ? "已激活" : "未激活";
    
    // 到期时间【已经后端适配好，直接取 displayExpire 完美显示】
    let expireText = item.displayExpire || "永久";

    // 设备
    let hasDevice = item.deviceFp ? "已绑定" : "未绑定";

    // 状态
    let enableText = item.enabled ? "正常" : "禁用";

    html += `
    <tr>
      <td>${item.username}</td>
      <td>${item.password}</td>
      <td>${activeText}</td>
      <td>${expireText}</td>
      <td>${hasDevice}</td>
      <td>${item.changeDeviceTimes}</td>
      <td>${enableText}</td>
      <td>
        <button class="btn" onclick="resetDevice('${item.username}')">重置设备</button>
        <button class="btn btn-danger" onclick="forceLogout('${item.username}')">强制下线</button>
        <button class="btn btn-success" onclick="toggleStatus('${item.username}',${!item.enabled})">${item.enabled?'禁用':'启用'}</button>
        <button class="btn btn-danger" onclick="delUser('${item.username}')">删除</button>
      </td>
    </tr>
    `;
  });
  document.getElementById("tableBody").innerHTML = html;
}

// 重置换绑次数
async function resetDevice(username){
  await fetch(`${backend}/api/admin/reset-device-times`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username})
  });
  loadList();
}

// 强制下线
async function forceLogout(username){
  await fetch(`${backend}/api/admin/force-logout`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username})
  });
  loadList();
}

// 启用禁用
async function toggleStatus(username,enabled){
  await fetch(`${backend}/api/admin/toggle`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,enabled})
  });
  loadList();
}

// 删除
async function delUser(username){
  if(!confirm("确定删除？"))return;
  await fetch(`${backend}/api/admin/delete`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username})
  });
  loadList();
}

// 批量创建
async function batchAdd(){
  let lines = document.getElementById("batchText").value;
  let days = Number(document.getElementById("dayNum").value);
  let res = await fetch(`${backend}/api/admin/batch`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({lines,days})
  });
  let data = await res.json();
  alert(`成功：${data.success} 个，已存在：${data.exist} 个`);
  loadList();
  document.getElementById("batchText").value = "";
}
</script>

</body>
</html>
